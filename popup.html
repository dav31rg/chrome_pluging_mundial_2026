<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Mode + Mundial 2026</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- ── Tab Navigation ──────────────────────────── -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="theme">
        <span id="header-icon">☀️</span> Tema
      </button>
      <button class="tab-btn" data-tab="futbol">
        🏆 Mundial 2026
      </button>
    </nav>

    <!-- ══════════════════════════════════════════════ -->
    <!-- Tab: Tema                                      -->
    <!-- ══════════════════════════════════════════════ -->
    <div id="tab-theme" class="tab-content">

      <div class="site-badge">
        <span class="site-label">Sitio actual:</span>
        <span id="site-name">cargando...</span>
      </div>

      <div class="toggle-card" id="toggle-card">
        <div class="toggle-info">
          <span class="mode-icon" id="mode-icon">☀️</span>
          <div class="mode-texts">
            <span class="mode-text" id="mode-text">Modo Claro</span>
            <span class="mode-sub" id="mode-sub">Haz clic para activar modo oscuro</span>
          </div>
        </div>
        <label class="switch" aria-label="Activar modo oscuro">
          <input type="checkbox" id="dark-toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div id="unsupported" class="unsupported hidden">
        <span class="unsupported-icon">⚠️</span>
        <p>No disponible en esta página.<br/>Solo funciona en sitios http/https.</p>
      </div>

      <p class="hint">El ajuste se guarda por sitio web</p>
    </div>

    <!-- ══════════════════════════════════════════════ -->
    <!-- Tab: Mundial 2026                              -->
    <!-- ══════════════════════════════════════════════ -->
    <div id="tab-futbol" class="tab-content hidden">

      <!-- Favorite team -->
      <div class="search-box">
        <input
          type="text"
          id="team-search"
          placeholder="Tu selección favorita (ej. Argentina)…"
          autocomplete="off"
        />
        <button id="search-btn" aria-label="Guardar selección favorita">⭐</button>
      </div>
      <div id="favorite-badge" class="favorite-badge hidden">
        Siguiendo a <strong id="favorite-name"></strong>
        <button id="favorite-clear" aria-label="Quitar favorito">✕</button>
      </div>

      <!-- Sub-tabs: Hoy / Próximos / Grupos -->
      <div id="match-sub-tabs" class="sub-tabs">
        <button class="sub-tab active" data-type="today">Hoy</button>
        <button class="sub-tab" data-type="next">Próximos</button>
        <button class="sub-tab" data-type="groups">Grupos</button>
      </div>

      <!-- Matches / groups container (scrollable) -->
      <div id="matches-container">
        <div class="loading-state"><div class="spinner"></div><span>Cargando…</span></div>
      </div>

    </div><!-- /tab-futbol -->

  </div><!-- /container -->
  <script src="popup.js"></script>
</body>
</html>
